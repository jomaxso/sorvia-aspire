name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore package project
        run: dotnet restore src/Sorvia.Aspire.Hosting.Dokploy/Sorvia.Aspire.Hosting.Dokploy.csproj

      - name: Build package project
        run: dotnet build src/Sorvia.Aspire.Hosting.Dokploy/Sorvia.Aspire.Hosting.Dokploy.csproj -c Release --no-restore

      - name: Pack NuGet package
        run: dotnet pack src/Sorvia.Aspire.Hosting.Dokploy/Sorvia.Aspire.Hosting.Dokploy.csproj -c Release --no-build -p:ContinuousIntegrationBuild=true -o ./artifacts

      - name: Build demo AppHost
        run: dotnet build demo/demo.AppHost/demo.AppHost.csproj -c Release

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sorvia.Aspire.Hosting.Dokploy-package
          path: ./artifacts/*.nupkg
          if-no-files-found: error
